pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.20" apply false
}

include ":app"

def localProperties = new Properties()
def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterSdkPath = localProperties.getProperty("flutter.sdk")
assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
apply from: "$flutterSdkPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"

// Comprehensive fix for subprojects (plugins)
gradle.beforeProject { project ->
    if (project != project.rootProject) {
        project.afterEvaluate {
            if (project.hasProperty('android')) {
                def android = project.extensions.findByName('android')
                if (android != null) {
                    // 1. Fix missing namespace
                    if (android.namespace == null) {
                        android.namespace = project.group
                    }
                    
                    // 2. Fix JVM target inconsistency (Inconsistent JVM-target compatibility)
                    android.compileOptions {
                        sourceCompatibility JavaVersion.VERSION_17
                        targetCompatibility JavaVersion.VERSION_17
                    }
                    
                    // 3. Fix Kotlin JVM target
                    if (project.plugins.hasPlugin('kotlin-android')) {
                        project.kotlin {
                            compilerOptions {
                                jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
                            }
                        }
                    }
                }
            }
        }
    }
}
