name: 📸 Build Camera APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ───────────────────────────────────────────
      # 1. Checkout
      # ───────────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ───────────────────────────────────────────
      # 2. Java 17 (مطلوب لـ Flutter 3.x)
      # ───────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ───────────────────────────────────────────
      # 3. Flutter
      # ───────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      # ───────────────────────────────────────────
      # 4. Fix: local.properties (sdk path)
      # ───────────────────────────────────────────
      - name: 🔧 Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      # ───────────────────────────────────────────
      # 5. Install dependencies
      # ───────────────────────────────────────────
      - name: 📦 Get dependencies
        run: flutter pub get

      # ───────────────────────────────────────────
      # 6. Build APK (split per ABI = أصغر حجم)
      # ───────────────────────────────────────────
      - name: 🔨 Build APK
        run: flutter build apk --release --split-per-abi

      # ───────────────────────────────────────────
      # 7. Upload as artifact (على كل push)
      # ───────────────────────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: camera-app-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      # ───────────────────────────────────────────
      # 8. GitHub Release (بس لما تعمل tag زي v1.0.0)
      # ───────────────────────────────────────────
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "📸 Camera App ${{ github.ref_name }}"
          body: |
            ## تطبيق الكاميرا - ${{ github.ref_name }}

            ### الـ APK files:
            - `app-arm64-v8a-release.apk` → أجهزة حديثة (64-bit) ✅ **الأنسب للأغلب**
            - `app-armeabi-v7a-release.apk` → أجهزة قديمة (32-bit)
            - `app-x86_64-release.apk` → المحاكيات

            ### إزاي تنزله؟
            1. افتح الـ Assets تحت
            2. حمّل الـ APK المناسب لجهازك
            3. فعّل "تثبيت من مصادر غير معروفة" من الإعدادات
            4. ثبّت وشغّل 🎉
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: false
          draft: false
          prerelease: false
